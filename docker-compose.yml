services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estopia-open
    networks:
      - proxy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
